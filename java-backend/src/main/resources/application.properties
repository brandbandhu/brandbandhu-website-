server.port=4000

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/brandbandhu_cms}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

app.client-origin=${CLIENT_ORIGIN:http://localhost:5173}
app.admin-username=${ADMIN_USERNAME:admin}
app.admin-password=${ADMIN_PASSWORD:change_this_strong_password}
app.session-cookie-name=admin_session
app.session-ttl-hours=24

app.privyr-webhook-url=${PRIVYR_WEBHOOK_URL:https://www.privyr.com/api/v1/incoming-leads/0vZfjMQw/cgVVSiYW}
app.google-sheets-webhook-url=${GOOGLE_SHEETS_WEBHOOK_URL:https://script.google.com/macros/s/AKfycbyaZCDJfaN1TBZvoJpz19fo7KTY-Bio-geYQFBU8Vc6FcTUX7nb6iIJmw35shxbHrpuWg/exec}
